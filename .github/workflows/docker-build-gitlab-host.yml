# Converted from .gitlab-ci.yml
# Builds a Docker image and pushes to GitHub Container Registry (ghcr.io)

name: Docker Build with Gitlab Hosting

on:
  workflow_dispatch:
  push:
    branches:
      - production
  pull_request:
    branches:
      - production

jobs:
  docker-build-gitlab-host:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout with submodules and LFS
        uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: true

      - name: Check Dockerfile exists
        run: test -f Dockerfile

      - name: Free disk space
        run: |
          df -h
          docker system prune -fa
          df -h

      - name: Log in to UE Registry
        run: docker login -u "${{ secrets.UE_REGISTRY_USER }}" -p "${{ secrets.UE_REGISTRY_PASSWORD }}" ${{ secrets.UE_REGISTRY }}
        
      - name: Login to GitLab
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v1
        with:
          registry: git.ri.se:4567
          username: ${{ github.actor }} # can be anything, not important
          password: ${{ secrets.RISE_GITLAB_PAT }}
          
      - name: Build and push prod frontend image
        uses: docker/build-push-action@v2
        with:
          push: true
          tags: git.ri.se:4567/teknologier-for-interaktion/vaxr-lab:production
